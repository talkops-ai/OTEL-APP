apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey-cart.fullname" . }}
  labels:
    {{- include "valkey-cart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: valkey-cart
  selector:
    {{- include "valkey-cart.selectorLabels" . | nindent 4 }}
