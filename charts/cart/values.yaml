# Cart Service configuration
replicaCount: 1
revisionHistoryLimit: 10

image:
  repository: ghcr.io/open-telemetry/demo
  tag: ""  # defaults to Chart.AppVersion with -cart suffix
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    cpu: 300m
    memory: 160Mi

podAnnotations:
  resource.opentelemetry.io/service.namespace: otel-demo

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # .NET needs writable /tmp
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 1000

livenessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

terminationGracePeriodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# OpenTelemetry configuration (disabled by default — enable when collector is ready)
otel:
  enabled: true
  collectorName: otel-demo-collector-collector.otel-demo.svc.cluster.local
  exporterEndpoint: "http://otel-demo-collector-collector.otel-demo.svc.cluster.local:4318"
  resourceAttributes: "service.namespace=otel-demo"
  logsExporter: "otlp"
  logsProtocol: "http/protobuf"

# Init container to wait for valkey
initContainers:
  waitForValkey: true

# Service dependencies
dependencies:
  valkeyCart:
    host: valkey-cart
    port: "6379"
  flagd:
    host: flagd
    port: "8013"
