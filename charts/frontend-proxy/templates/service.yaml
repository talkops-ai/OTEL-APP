apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend-proxy.fullname" . }}
  labels:
    {{- include "frontend-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: tcp-service
  selector:
    {{- include "frontend-proxy.selectorLabels" . | nindent 4 }}
