# Ad Service configuration
replicaCount: 1
revisionHistoryLimit: 10

image:
  repository: ghcr.io/open-telemetry/demo
  tag: ""  # defaults to Chart.AppVersion with -ad suffix
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 300Mi

podAnnotations:
  resource.opentelemetry.io/service.namespace: otel-demo

# Container-level security context (least privilege)
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Pod-level security context
podSecurityContext:
  fsGroup: 1000

# Health checks
livenessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 60

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Scheduling rules
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# OpenTelemetry configuration (disabled by default — enable when collector is ready)
otel:
  enabled: true
  collectorName: opentelemetry-otel.otel-demo.svc.cluster.local
  exporterEndpoint: "http://opentelemetry-otel.otel-demo.svc.cluster.local:4318"
  resourceAttributes: "service.namespace=otel-demo"
  logsExporter: "otlp"
  logsProtocol: "http/protobuf"

# Service dependencies (configurable for different environments)
dependencies:
  flagd:
    host: flagd
    port: "8013"
