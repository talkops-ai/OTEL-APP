apiVersion: v1
kind: Service
metadata:
  name: {{ include "quote.fullname" . }}
  labels:
    {{- include "quote.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: service
  selector:
    {{- include "quote.selectorLabels" . | nindent 4 }}
