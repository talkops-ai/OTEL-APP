# Product Catalog Service configuration
replicaCount: 1
revisionHistoryLimit: 10

image:
  repository: ghcr.io/open-telemetry/demo
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 200Mi

podAnnotations:
  resource.opentelemetry.io/service.namespace: otel-demo

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 1000

livenessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  grpc:
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 3
  failureThreshold: 20

terminationGracePeriodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# OpenTelemetry configuration (disabled by default — enable when collector is ready)
otel:
  enabled: true
  collectorName: opentelemetry-otel.otel-demo.svc.cluster.local
  exporterEndpoint: "http://opentelemetry-otel.otel-demo.svc.cluster.local:4318"
  exporterProtocol: "grpc"
  resourceAttributes: "service.namespace=otel-demo"
  logsExporter: "otlp"
  logsProtocol: "grpc"

# Go memory limit
goMemLimit: "160MiB"

# Service dependencies
dependencies:
  postgresql:
    host: postgresql
    port: "5432"
    user: root
    password: otel
    database: otel
    sslMode: disable
  flagd:
    host: flagd
    port: "8013"
